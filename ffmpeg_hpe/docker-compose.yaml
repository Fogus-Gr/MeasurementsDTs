services:
  rtsp-broker:
    image: bluenviron/mediamtx:1-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"  # RTSP
      - "8888:8888"  # HLS (optional, useful for debugging)
    networks:
      - streaming-network
    # NOTE: no healthcheck here. The MediaMTX image is a distroless single binary
    # with no shell, nc, wget, or curl — any CMD-SHELL probe will fail and leave
    # the container permanently "unhealthy", which blocks `service_healthy` gating.
    # Readiness is enforced from outside the container: run_experiment.sh probes
    # 127.0.0.1:8554 from the host before starting dependents, and the streamer
    # has `restart: on-failure` which covers the rare case where it loses the race.
    deploy:
      resources:
        # MediaMTX is a relay (no transcoding); RTSP forwarding fits well under
        # 0.5 CPU and 256 MB even at 1080p. Tightened from 2.0/1G to free
        # headroom on the 8 vCPU / 16 GB cloud GPU benchmarking VM.
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  streamer:
    image: jrottenberg/ffmpeg:4.4-nvidia
    container_name: video-producer
    restart: on-failure
    depends_on:
      rtsp-broker:
        condition: service_started
    volumes:
      - ../videos:/data:ro
    networks:
      - streaming-network
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
    deploy:
      resources:
        # NVENC offloads H.264 encode to the GPU; the FFmpeg control loop and
        # RTSP packetisation are light. 0.75 CPU / 512 MB is sufficient for
        # 1080p sources on the 8 vCPU benchmarking VM.
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # -rtsp_transport tcp: forces RTP over TCP on the producer side. The HPE
    #   consumer is pinned separately via OPENCV_FFMPEG_CAPTURE_OPTIONS below.
    #   Both ends must use TCP — bcc_rx_bytes.py attaches a TCP socket filter
    #   on eth0, so any UDP RTP traffic would be invisible to it.
    # -stream_loop -1: loops the video file indefinitely for repeatable experiments
    # NVENC low-latency: -preset p2 (low-latency-balanced) + -tune ll (low-latency tune).
    # Do NOT also pass -zerolatency 1 — it duplicates -tune ll and triggers an NVENC warning.
    command: >
      -re -stream_loop -1 -i /data/${VIDEO_FILE_NAME:-Clipchamp30s.mp4}
      -c:v h264_nvenc -preset p2 -tune ll
      -rtsp_transport tcp
      -f rtsp rtsp://rtsp-broker:8554/stream

  hpe:
    build:
      context: ..
      dockerfile: Dockerfile_base
    # runtime: nvidia is NOT set here unconditionally.
    # run_experiment.sh sets NVIDIA_VISIBLE_DEVICES=none for CPU-only methods
    # (ae1, ae2, ae3, hrnet, movenet) so the NVIDIA container runtime is not
    # required and the container starts on hosts without a GPU driver.
    # For GPU methods (alphapose, openpose) run_experiment.sh leaves
    # NVIDIA_VISIBLE_DEVICES unset (defaults to "all") and passes
    # --gpus all via DOCKER_COMPOSE_HPE_RUNTIME, which is substituted below.
    runtime: ${HPE_RUNTIME:-runc}
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - OPENCV_FFMPEG_DEBUG=1
      - OPENCV_LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:32
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - OPENCV_FFMPEG_OPEN_TIMEOUT=300000
      - OPENCV_FFMPEG_READ_TIMEOUT=300000
      # Force OpenCV's FFmpeg backend to pull RTP over TCP. Without this the
      # default is UDP, which (a) bypasses the bcc-tracer TCP socket filter so
      # RX bytes read as ~0, and (b) silently drops packets under load.
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp
      # OpenVINO CPU tuning — set by run_experiment.sh based on method and nproc
      - OV_THREADS=${OV_THREADS:-4}
      - OV_MODE=${OV_MODE:-latency}
      - OV_CPU_PINNING=${OV_CPU_PINNING:-true}
      - OV_HYPER_THREADING=${OV_HYPER_THREADING:-false}
    volumes:
      - ./results:/output:rw
      - ../videos:/videos:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*main.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          # CPU and memory are set dynamically by run_experiment.sh based on
          # nproc and HPE method. Sidecars (streamer, perf_monitor, bcc-tracer,
          # gpu-metrics) consume ~1.6 CPUs peak; 2 vCPUs are reserved for them,
          # leaving the remainder for HPE. Override by setting HPE_CPU_LIMIT,
          # HPE_MEMORY_LIMIT before running run_experiment.sh.
          cpus: '${HPE_CPU_LIMIT:-2.0}'
          memory: ${HPE_MEMORY_LIMIT:-4G}
        reservations:
          # Guarantee HPE always gets its reserved cores even under sidecar BPF
          # compile spikes at startup.
          cpus: '${HPE_CPU_RESERVATION:-2.0}'
    container_name: hpe
    depends_on:
      rtsp-broker:
        condition: service_started
      streamer:
        condition: service_started
    networks:
      - streaming-network
    dns_search: .
    command: >
      python3 main.py --method ${HPE_METHOD} --input ${HPE_INPUT} --csv --output_dir /output/ --device ${HPE_DEVICE} --measurement_interval_ms 10

  gpu-metrics:
    build:
      context: .
      dockerfile: Dockerfile.gpu_metrics
    container_name: gpu-metrics
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./results:/output
    networks:
      - streaming-network
    depends_on:
      - rtsp-broker
      - hpe
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nvidia-smi"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        # nvidia-smi polling is essentially idle CPU; cap aggressively so it
        # cannot interfere with HPE measurements.
        limits:
          cpus: '0.1'
          memory: 128M

  perf_monitor:
    container_name: perf_monitor
    build:
      context: ../recent-dash/perf_monitor
      dockerfile: Dockerfile
    volumes:
      - ./results:/output:rw
      - ./pids:/pids:ro
    environment:
      - OUTPUT_DIR=/output
      - EXPERIMENT_TYPE=ffmpeg_hpe
      - PID_FILE=/pids/hpe.pid
      - INTERVAL=${PERF_MONITOR_INTERVAL_SECONDS:-0.5}
    depends_on:
      - rtsp-broker
      - hpe
    pid: host
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
    privileged: true
    user: root
    networks:
      - streaming-network
    deploy:
      resources:
        # bpftrace + ps polling at 500 ms is light; cap to keep host PID-mode
        # tracing isolated from HPE CPU accounting.
        limits:
          cpus: '0.25'
          memory: 256M

  bcc-tracer:
    build:
      context: ./bpftrace-tracer
      dockerfile: Dockerfile.bcc
    container_name: bcc-tracer
    volumes:
      - ./tracer_output:/opt/tracer/output
      - ./pids:/pids:ro
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /sys/kernel/debug:/sys/kernel/debug
    user: root
    environment:
      - TARGET_CONTAINER=hpe
      - STREAMER_IP=rtsp-broker
      - STREAMER_PORT=8554
      - PORT_DETECTION_TIMEOUT=30
      - BCC_POLL_INTERVAL_S=0.01
    network_mode: "service:hpe"
    depends_on:
      - hpe
      - rtsp-broker
      - streamer
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_RESOURCE
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        # 0.5 CPU accommodates the BPF JIT compile burst at startup; steady
        # state is far lower. Memory cap covers BPF maps + Python runtime.
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  streaming-network:
    driver: bridge
