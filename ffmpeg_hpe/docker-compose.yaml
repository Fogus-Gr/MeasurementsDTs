services:
  rtsp-broker:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"  # RTSP
      - "8888:8888"  # HLS (optional, useful for debugging)
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8554 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

  streamer:
    image: jrottenberg/ffmpeg:4.4-nvidia
    container_name: video-producer
    restart: on-failure
    depends_on:
      rtsp-broker:
        condition: service_healthy
    volumes:
      - ../videos:/data:ro
    networks:
      - streaming-network
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # -rtsp_transport tcp: forces RTP over TCP so bcc-tracer (TCP filter) captures all video bytes
    # -stream_loop -1: loops the video file indefinitely for repeatable experiments
    command: >
      -re -stream_loop -1 -i /data/${VIDEO_FILE_NAME:-vga_01_01.mp4}
      -c:v h264_nvenc -preset p2 -tune ll -zerolatency 1
      -rtsp_transport tcp
      -f rtsp rtsp://rtsp-broker:8554/stream

  hpe:
    build:
      context: ..
      dockerfile: Dockerfile_base
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - OPENCV_FFMPEG_DEBUG=1
      - OPENCV_LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:32
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - OPENCV_FFMPEG_OPEN_TIMEOUT=300000
      - OPENCV_FFMPEG_READ_TIMEOUT=300000
    volumes:
      - ./results:/output:rw
      - ../videos:/videos:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*main.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: hpe
    depends_on:
      rtsp-broker:
        condition: service_healthy
      streamer:
        condition: service_started
    networks:
      - streaming-network
    dns_search: .
    command: >
      python3 main.py --method ${HPE_METHOD} --input ${HPE_INPUT} --csv --output_dir /output/ --device ${HPE_DEVICE} --measurement_interval_ms 10

  gpu-metrics:
    build:
      context: .
      dockerfile: Dockerfile.gpu_metrics
    container_name: gpu-metrics
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./results:/output
    networks:
      - streaming-network
    depends_on:
      - rtsp-broker
      - hpe
    healthcheck:
      test: ["CMD", "pgrep", "-f", "nvidia-smi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  perf_monitor:
    container_name: perf_monitor
    build:
      context: ../recent-dash/perf_monitor
      dockerfile: Dockerfile
    volumes:
      - ./results:/output:rw
      - ./pids:/pids:ro
    environment:
      - OUTPUT_DIR=/output
      - EXPERIMENT_TYPE=ffmpeg_hpe
    depends_on:
      - rtsp-broker
      - hpe
    pid: host
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
    privileged: true
    user: root
    networks:
      - streaming-network

  bcc-tracer:
    build:
      context: ./bpftrace-tracer
      dockerfile: Dockerfile.bcc
    container_name: bcc-tracer
    volumes:
      - ./tracer_output:/opt/tracer/output
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /sys/kernel/debug:/sys/kernel/debug
    user: root
    environment:
      - TARGET_CONTAINER=hpe
      - STREAMER_IP=rtsp-broker
      - STREAMER_PORT=8554
      - PORT_DETECTION_TIMEOUT=30
    network_mode: "service:hpe"
    depends_on:
      - hpe
      - rtsp-broker
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_RESOURCE
    security_opt:
      - seccomp:unconfined

networks:
  streaming-network:
    driver: bridge
