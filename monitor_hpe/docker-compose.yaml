services:
  hpe:
    image: monitor-hpe:latest
    build:
      context: ..
      dockerfile: Dockerfile_base
    entrypoint: ["/app/entrypoint.sh"]
    command: python3 main.py --method ${HPE_METHOD:-movenet} --input /videos/${VIDEO_FILE:-ultimatum/hd_00_00.mp4} --device ${HPE_DEVICE:-CPU}
    pid: "host"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    volumes:
      - ./pids:/pids:rw
      - /home/user/MeasurementsDTs/videos:/videos:ro
    environment:
      - PYTHONUNBUFFERED=1
      # OpenVINO CPU optimization (configured by run_experiment.sh based on method)
      - OV_THREADS=${OV_THREADS:-6}
      - OV_MODE=${OV_MODE:-latency}
      - OV_CPU_PINNING=${OV_CPU_PINNING:-true}
      - OV_HYPER_THREADING=${OV_HYPER_THREADING:-false}
    deploy:
      resources:
        limits:
          cpus: ${HPE_CPU_LIMIT:-6.0}
          memory: ${HPE_MEMORY_LIMIT:-6G}
        reservations:
          cpus: ${HPE_CPU_RESERVATION:-4.0}
          memory: ${HPE_MEMORY_RESERVATION:-4G}

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    pid: "host"
    cap_add:
      - IPC_LOCK
      - SYS_ADMIN
    ulimits:
      memlock: -1  # Unlimited memory lock
    volumes:
      - ./pids:/pids:rw
      - ./results:/output:rw
    environment:
      - TARGET_PID_FILE=/pids/hpe.pid
      - BPFTRACE_STRLEN=64  # Ensure string length is sufficient
    command: /monitor_pid.sh
    deploy:
      resources:
        limits:
          cpus: '2.0'  # 2 cores for monitoring (8 vCPU total: 6 HPE + 2 monitor)
          memory: 512M # Modest memory limit
        reservations:
          cpus: '1.0'  # Guarantee at least 1 core
          memory: 256M


