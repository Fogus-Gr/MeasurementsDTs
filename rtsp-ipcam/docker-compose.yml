
services:
  h264-streaming-server:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: h264-streaming-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      # Mount your video files directory
      - ${VIDEO_HOST_PATH:-./videos/hd_00_00.mp4}:/app/videos/hd_00_00.mp4:ro
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - VIDEO_FILE=/app/videos/hd_00_00.mp4
    # Use a custom network for isolation
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT}/stream.h264"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 500M
        reservations:
          cpus: '0.5'
          memory: 128M
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=1000m

  # Optional: Nginx reverse proxy for production
  # nginx-proxy:
  #   image: nginx:alpine
  #   container_name: nginx-streaming-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
  #     - ./nginx-entrypoint.sh:/nginx-entrypoint.sh:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   command: ["/bin/sh", "-c", "chmod +x /nginx-entrypoint.sh && /nginx-entrypoint.sh"]
  #   environment:
  #     - SERVER_PORT=${SERVER_PORT}
  #   depends_on:
  #     - h264-streaming-server
  #   networks:
  #     - streaming-network

networks:
  streaming-network:
    driver: bridge
