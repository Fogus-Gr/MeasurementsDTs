# docker-compose.cpu.yaml — CPU-only HPE experiment rig (no GPU)
#
# Services:
#   h264-streaming-server  — H.264 MJPEG streamer (shared from rtsp-ipcam/)
#   hpe                     — HPE inference container (Dockerfile_cpu, no GPU)
#   perf_monitor            — CPU/memory monitor via /proc/<pid>/stat (shared/)
#   bcc-tracer              — RX network tracer via BPF socket filter (ffmpeg_hpe/bpftrace-tracer/)
#
# The gpu-metrics service from the GPU rig is intentionally absent.
#
# Usage:
#   docker compose --env-file .env.cpu -f docker-compose.cpu.yaml up -d

services:
  h264-streaming-server:
    build:
      context: ../rtsp-ipcam
      dockerfile: Dockerfile
    container_name: h264-streaming-server
    restart: unless-stopped
    ports:
      - "8089:8089"
    volumes:
      - ./results:/output
      - ../rtsp-ipcam/config:/app/config:ro
      - ../videos:/app/videos:ro
    environment:
      - SERVER_PORT=8089
      - VIDEO_FILE=${VIDEO_FILE:-/app/videos/rangeOfMotion/vga_01_01.mp4}
    networks:
      - streaming-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8089 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${STREAMER_CPUS:-1.0}"
          memory: 1G
        reservations:
          cpus: "${STREAMER_RESERVATION_CPUS:-1.0}"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=1000m

  hpe:
    build:
      context: ..
      dockerfile: Dockerfile_cpu
    # No runtime: nvidia — CPU-only container
    environment:
      - PYTHONUNBUFFERED=1
      - WAIT_HOSTS=h264-streaming-server:8089
      - WAIT_HOSTS_TIMEOUT=30
      # CPU optimization for OpenVINO backends (tuned for 6-vCPU VM)
      - OV_MODE=${OV_MODE:-latency}
      - OV_STREAMS=${OV_STREAMS:-1}
      - OV_THREADS=${OV_THREADS:-4}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-4}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-4}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-4}
      - OPENCV_FFMPEG_OPEN_TIMEOUT=300000
      - OPENCV_FFMPEG_READ_TIMEOUT=300000
    volumes:
      - ./results:/output:rw
      - ../videos:/videos:ro
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*main.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${HPE_CPUS:-4.0}"
          memory: 4G
    container_name: hpe
    depends_on:
      h264-streaming-server:
        condition: service_healthy
    networks:
      - streaming-network
    dns_search: .
    command: >
      python3 main.py --method ${HPE_METHOD} --input ${HPE_INPUT} --csv --output_dir /output/ --device ${HPE_DEVICE} --measurement_interval_ms 10 ${HPE_EXTRA_ARGS:-}

  perf_monitor:
    container_name: perf_monitor
    build:
      context: ../shared/perf_monitor
      dockerfile: Dockerfile
    volumes:
      - ./results:/output:rw
      - ./pids:/pids:ro
    environment:
      - OUTPUT_DIR=/output
      - PID_FILE=/pids/hpe.pid
      - EXPERIMENT_TYPE=ffmpeg_hpe_cpu
      - INTERVAL=0.5
    depends_on:
      - h264-streaming-server
    pid: host
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
    privileged: true
    user: root
    networks:
      - streaming-network

  bcc-tracer:
    build:
      context: ../ffmpeg_hpe/bpftrace-tracer
      dockerfile: Dockerfile.bcc
    container_name: bcc-tracer
    volumes:
      - ./tracer_output:/opt/tracer/output
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /sys/kernel/debug:/sys/kernel/debug
    user: root
    environment:
    - TARGET_CONTAINER=hpe
    - STREAMER_IP=h264-streaming-server
    - PORT_DETECTION_TIMEOUT=30
    network_mode: "service:hpe"
    depends_on:
      - hpe
    privileged: true
    cap_add:
    - SYS_ADMIN
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_RESOURCE
    security_opt:
    - seccomp:unconfined

networks:
  streaming-network:
    driver: bridge
