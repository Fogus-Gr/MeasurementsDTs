name: dash-caching
services:
  http_server:
    image: dash-caching:http
    expose:
      - "80"
    environment:
      - SERVICE_ADDITIONAL_PARAMETERS=-r2 5.0
    build:
      dockerfile: HTTP-Server.Dockerfile
    labels:
      - "coroot.monitored=true"
      - "coroot.service.type=streaming"
      - "coroot.logs.enabled=true"
    networks:
      default:
        ipv4_address: ${DASH_SERVER_IP:-172.28.0.2}
    deploy:
      resources:
        limits:
          cpus: '${HTTP_SERVER_CPU_LIMIT:-0.5}'
          memory: ${HTTP_SERVER_MEMORY_LIMIT:-512M}

  http_proxy:
    image: dash-caching:proxy_fixed_dl
    expose:
      - "80"
    ports:
      - "${HTTP_PROXY_HOST_PORT:-8881}:80"
    environment:
      - HTTP_SERVER_DOMAIN=http_server
      - HTTP_SERVER_PORT=80
      - SERVICE_ADDITIONAL_PARAMETERS=${PROXY_PARAMS:--al swg -r1 8.3 -r2 3.6 -l 3000 -dl fixed -c random -s 600 -n 65}
    depends_on:
      - http_server
    pid: "host"
    build:
      dockerfile: HTTP-Proxy.Dockerfile
    labels:
      - "coroot.monitored=true"
      - "coroot.service.type=streaming"
      - "coroot.logs.enabled=true"
    networks:
      default:
        ipv4_address: ${DASH_PROXY_IP:-172.28.0.3}
    deploy:
      resources:
        limits:
          cpus: '${HTTP_PROXY_CPU_LIMIT:-1.0}'
          memory: ${HTTP_PROXY_MEMORY_LIMIT:-1G}

  http_client:
    image: dash-caching:client
    expose:
      - "80"
    ports:
      - "80"
    volumes:
      # Mount single-representation manifest so segment fetches still travel
      # through the proxy.  A single-rep manifest is required because the
      # origin server (main binary) only handles one HTTP connection at a time;
      # FFmpeg's DASH demuxer opens concurrent connections for each
      # AdaptationSet/Representation, which deadlocks the server.
      - ./segments/${DASH_MANIFEST:-manifest_single.mpd}:/opt/http_local/public/manifest.mpd:ro
    environment:
      - HTTP_PROXY_DOMAIN=http_proxy
      - HTTP_PROXY_PORT=80
    depends_on:
      - http_proxy
    build:
      dockerfile: HTTP-Client.Dockerfile
    labels:
      - "coroot.monitored=true"
      - "coroot.service.type=streaming"
      - "coroot.logs.enabled=true"
    networks:
      default:
        ipv4_address: ${DASH_CLIENT_IP:-172.28.0.4}
    deploy:
      resources:
        limits:
          cpus: '${HTTP_CLIENT_CPU_LIMIT:-0.5}'
          memory: ${HTTP_CLIENT_MEMORY_LIMIT:-512M}

  # mpv:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile_mpv
  #   image: dash-caching:mpv
  #   depends_on:
  #     - http_client
  #   restart: unless-stopped
  #   environment:
  #     - DASH_PLAYER_URL=http://http_client/manifest.mpd
  #     - DASH_PLAYER_WARMUP_SECONDS=${DASH_PLAYER_WARMUP_SECONDS:-30}
  #     - DASH_PLAYER_RETRY_DELAY_SECONDS=${DASH_PLAYER_RETRY_DELAY_SECONDS:-1}
  #     - DASH_PLAYER_START_DELAY_SECONDS=${DASH_PLAYER_START_DELAY_SECONDS:-5}
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '${MPV_CPU_LIMIT:-0.5}'
  #         memory: ${MPV_MEMORY_LIMIT:-512M}

  cvlc:
    build:
      context: .
      dockerfile: Dockerfile
    image: cvlc-dash-player
    depends_on:
      - http_client
    restart: unless-stopped
    command: [ "http://http_client/manifest.mpd", "--vout=dummy", "--aout=dummy" ]
    deploy:
      resources:
        limits:
          cpus: '${CVLC_CPU_LIMIT:-0.5}'
          memory: ${CVLC_MEMORY_LIMIT:-512M}

  perf_monitor:
    build:
      context: ../shared/perf_monitor
      dockerfile: Dockerfile
    volumes:
      - ./results:/output:rw
      - ./pids:/pids:ro
    environment:
      - OUTPUT_DIR=/output
      - PID_FILE=/pids/dash.pid
      - INTERVAL=${PERF_MONITOR_INTERVAL_SECONDS:-0.5}
    pid: host
    cap_add:
      - SYS_ADMIN
      - SYS_NICE
      - IPC_LOCK
      - SYS_PTRACE # Add this for process monitoring
    privileged: true
    user: root # Ensure running as root
    deploy:
      resources:
        limits:
          cpus: '${PERF_MONITOR_CPU_LIMIT:-0.25}'
          memory: ${PERF_MONITOR_MEMORY_LIMIT:-256M}

  trace_container:
    image: bpftrace-container:latest
    build:
      context: ./bpftrace-tracer
      dockerfile: Dockerfile
    privileged: true
    pid: host
    network_mode: "host"
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_RESOURCE
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    environment:
      - NETIF=${DASH_TRACE_INTERFACE:-any} # Capture Docker bridge traffic by default
      - DASH_SERVER_IP=${DASH_SERVER_IP:-}
      - DASH_PROXY_IP=${DASH_PROXY_IP:-}
      - DASH_CLIENT_IP=${DASH_CLIENT_IP:-}
      - DASH_PLAYER_IP=${DASH_PLAYER_IP:-}
      - TRACE_INTERVAL_MS=${TRACE_INTERVAL_MS:-10}
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug # Required for bpftrace
      - /lib/modules:/lib/modules:ro # Required for bpftrace
      - ./bpftrace-tracer:/opt/tracer # Ensure ./bpftrace-tracer exists
      - ./traces:/opt/tracer/output # Ensure ./traces is cleaned up before starting
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /sys:/sys:ro
    working_dir: /opt/tracer
    entrypoint: [ "/bin/bash", "-c" ]
    command: ./trace_container_net.sh
    deploy:
      resources:
        limits:
          cpus: '${TRACE_CONTAINER_CPU_LIMIT:-0.5}'
          memory: ${TRACE_CONTAINER_MEMORY_LIMIT:-256M}

networks:
  default:
    name: dash-caching_default
    ipam:
      config:
        - subnet: ${DASH_SUBNET:-172.28.0.0/24}
